

services:

  # ── Database ──────────────────────────────────
  mongo:
    image: mongo:7
    container_name: pulseops-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - pulseops-net

  # ── Cache / Queue ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pulseops-redis
    ports:
      - "6379:6379"
    networks:
      - pulseops-net

  # ── Backend ───────────────────────────────────
  backend:
    build: ./backend
    container_name: pulseops-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - pulseops-net

  # ── Frontend ──────────────────────────────────
  frontend:
    build: ./frontend
    container_name: pulseops-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - pulseops-net

  # ── AI Service ────────────────────────────────
  ai-service:
    build: ./ai-service
    container_name: pulseops-ai
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    volumes:
      - ./ai-service:/app          # hot reload for code changes
      - ./ai-service/models:/app/models  # persist trained models
      - ./ai-service/data:/app/data      # persist datasets
    networks:
      - pulseops-net

  # ── Nginx Reverse Proxy ───────────────────────
  nginx:
    image: nginx:alpine
    container_name: pulseops-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - ai-service
    networks:
      - pulseops-net

  n8n:
    image: n8nio/n8n:latest
    container_name: pulseops-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=pulseops123
      - GENERIC_TIMEZONE=Asia/Kolkata
      - N8N_LOG_LEVEL=info
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    dns:
      - 8.8.8.8                          
      - 8.8.4.4                          
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - pulseops-net
    depends_on:
      - backend

volumes:
  mongo-data:
  n8n-data:        # ← add this

networks:
  pulseops-net:
    driver: bridge