

services:

  # ── Database ──────────────────────────────────
  mongo:
    image: mongo:7
    container_name: pulseops-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - pulseops-net

  # ── Cache / Queue ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pulseops-redis
    ports:
      - "6379:6379"
    networks:
      - pulseops-net

  # ── Backend ───────────────────────────────────
  backend:
    build: ./backend
    container_name: pulseops-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - pulseops-net

  # ── Frontend ──────────────────────────────────
  frontend:
    build: ./frontend
    container_name: pulseops-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - pulseops-net

  # ── AI Service ────────────────────────────────
  ai-service:
    build: ./ai-service
    container_name: pulseops-ai
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    volumes:
      - ./ai-service:/app          # hot reload for code changes
      - ./ai-service/models:/app/models  # persist trained models
      - ./ai-service/data:/app/data      # persist datasets
    networks:
      - pulseops-net

  # ── Nginx Reverse Proxy ───────────────────────
  nginx:
    image: nginx:alpine
    container_name: pulseops-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - ai-service
    networks:
      - pulseops-net

networks:
  pulseops-net:
    driver: bridge

volumes:
  mongo-data: